<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Overlay</title>
  <style>
    :root {
      --bg: rgba(15, 15, 20, 0.9);
      --border: rgba(255,255,255,0.18);
      --text: #ffffff;
      --accent: #ff5fbf;
    }
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; font-family: Arial, Helvetica, sans-serif; }
    #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .alert {
      min-width: 620px; max-width: 80vw; padding: 24px; border-radius: 24px; color: var(--text);
      background: linear-gradient(135deg, var(--bg), rgba(255,95,191,0.3)); border: 2px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35); backdrop-filter: blur(10px); opacity: 0;
      transform: translateY(30px) scale(0.95); animation: enter 600ms ease forwards, leave 600ms ease 7.4s forwards;
      display: flex; gap: 18px; align-items: center;
    }
    .avatar { width: 96px; height: 96px; border-radius: 999px; object-fit: cover; background: rgba(255,255,255,0.08); flex: 0 0 auto; }
    .emoji { font-size: 30px; margin-bottom: 8px; }
    .title { font-size: 34px; font-weight: 800; line-height: 1.15; margin-bottom: 8px; }
    .subtitle { font-size: 20px; opacity: 0.95; }
    @keyframes enter { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes leave { to { opacity: 0; transform: translateY(-18px) scale(0.98); } }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script>
    const stage = document.getElementById('stage');
    const shown = new Set();
    const query = new URLSearchParams(location.search);
    const apiBaseUrl = `${location.origin}`;
    const channel = (query.get('channel') || '').trim().toLowerCase();
    const timezone = query.get('timezone') || 'America/Sao_Paulo';

    function showAlert(item) {
      const key = `${item.channel}-${item.username}-${item.date}-${item.time}`;
      if (shown.has(key)) return;
      shown.add(key);
      const el = document.createElement('div');
      el.className = 'alert';
      el.innerHTML = `
        ${item.avatarUrl ? `<img class="avatar" src="${item.avatarUrl}" alt="avatar">` : ''}
        <div>
          <div class="emoji">🎂🎉</div>
          <div class="title">${item.message}</div>
          <div class="subtitle">Canal: ${item.channel} • ${item.time}</div>
        </div>
      `;
      stage.appendChild(el);
      setTimeout(() => el.remove(), 8200);
    }

    async function poll() {
      if (!channel) return;
      const url = `${apiBaseUrl}/api/overlay/alerts?channel=${encodeURIComponent(channel)}&timezone=${encodeURIComponent(timezone)}`;
      const response = await fetch(url, { cache: 'no-store' });
      const data = await response.json();
      for (const item of data.due || []) showAlert(item);
    }

    poll();
    setInterval(poll, 30_000);
  </script>
</body>
</html>
